<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Octopus Ops 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #020617;
      --accent: #22c55e;
      --border-subtle: #1f2937;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
    }
    * { box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,#020617,#020617 40%,#000 100%);
      color:var(--text-main);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .panel {
      width:100%;
      max-width:420px;
      background:rgba(15,23,42,0.95);
      border-radius:14px;
      padding:24px 22px 20px;
      border:1px solid rgba(148,163,184,0.2);
      box-shadow:0 18px 45px rgba(15,23,42,0.9);
    }
    .panel-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      font-size:15px;
      font-weight:600;
    }
    .brand-logo {
      width:20px;
      height:20px;
      border-radius:8px;
      background:radial-gradient(circle at 30% 30%,#22c55e,#020617);
      box-shadow:0 0 18px rgba(34,197,94,0.9);
    }
    .tag {
      font-size:11px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.5);
      color:var(--text-muted);
    }
    h2 {
      margin:0 0 4px;
      font-size:17px;
    }
    p.sub {
      margin:0 0 14px;
      font-size:12px;
      color:var(--text-muted);
    }
    label {
      display:block;
      margin:6px 0 2px;
      font-size:12px;
      color:var(--text-muted);
    }
    input {
      width:100%;
      padding:7px 9px;
      border-radius:8px;
      border:1px solid #1f2937;
      background:#020617;
      color:var(--text-main);
      font-size:13px;
    }
    input:focus {
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 1px rgba(34,197,94,0.4);
    }
    button {
      width:100%;
      margin-top:14px;
      padding:8px 10px;
      border-radius:999px;
      border:none;
      background:var(--accent);
      color:#020617;
      font-weight:600;
      font-size:14px;
      cursor:pointer;
    }
    button:disabled {
      background:#4b5563;
      color:#d1d5db;
      cursor:not-allowed;
    }
    .status {
      margin-top:10px;
      font-size:12px;
      color:var(--text-muted);
      min-height:16px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <div class="brand">
        <span class="brand-logo"></span>
        <span>Octopus Ops 运维平台</span>
      </div>
      <span class="tag">登录</span>
    </div>
    <h2>账户登录</h2>
    <p class="sub">登录后可管理自己添加的主机资产与运维任务。</p>
    <label>用户名</label>
    <input id="login-username" value="admin" />
    <label>密码</label>
    <input id="login-password" type="password" value="admin123" />
    <button id="btn-login">登录</button>
    <div class="status" id="login-status"></div>
  </div>
  <script>
    const TOKEN_STORAGE_KEY = "octopus_tokens_v1";
    const USERNAME_STORAGE_KEY = "octopus_username_v1";

    function saveTokens(accessToken, refreshToken) {
      localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify({ accessToken, refreshToken, ts: Date.now() }));
    }
    function clearTokens() {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
    }
    function saveUsername(u) {
      localStorage.setItem(USERNAME_STORAGE_KEY, u);
    }

    function setStatus(msg) {
      document.getElementById("login-status").textContent = msg;
    }

    async function doLogin() {
      const u = document.getElementById("login-username").value.trim();
      const p = document.getElementById("login-password").value;
      if (!u || !p) {
        setStatus("请输入用户名和密码");
        return;
      }
      setStatus("登录中...");
      const btn = document.getElementById("btn-login");
      btn.disabled = true;
      try {
        const form = new URLSearchParams();
        form.append("username", u);
        form.append("password", p);
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: form.toString(),
        });
        const data = await resp.json();
        if (!resp.ok) {
          const detail = data && data.detail ? data.detail : resp.statusText;
          throw new Error(detail);
        }
        saveTokens(data.access_token, data.refresh_token);
        saveUsername(u);
        setStatus("登录成功，正在跳转...");
        window.location.href = "/ui";
      } catch (e) {
        console.error(e);
        clearTokens();
        setStatus("登录失败：" + (e && e.message ? e.message : String(e)));
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("btn-login").addEventListener("click", doLogin);
    document.getElementById("login-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
