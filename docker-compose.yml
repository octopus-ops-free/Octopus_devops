version: "3.9"

services:
  octopus:
    build: .
    container_name: octopus-ops
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
    # 如需在容器内使用 ssh 私钥访问被管主机，可选择挂载 ~/.ssh
    # volumes:
    #   - ./data:/app/data
    #   - ~/.ssh:/root/.ssh:ro

