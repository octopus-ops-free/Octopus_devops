services:
  octopus:
    # 从当前目录构建，避免一直用仓库里旧的 :latest 镜像（本地改代码后需重建才生效）
    build: .
    image: octopusops/octopus-ops:latest
    container_name: octopus-ops
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UI_MODE: react
    ports:
      - "8001:8001"
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
    # 如需在容器内使用 ssh 私钥访问被管主机，可选择挂载 ~/.ssh
    # volumes:
    #   - ./data:/app/data
    #   - ~/.ssh:/root/.ssh:ro

